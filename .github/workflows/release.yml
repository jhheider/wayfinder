name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to rebuild binaries + refresh formula"
        required: true
permissions:
  contents: write
jobs:
  release:
    uses: jhheider/rust-ci/.github/workflows/release.yml@v1
    with:
      # `wf` is the prebuilt + Homebrew binary; the MCP server ships via
      # `cargo install wayfinder-mcp` (all three crates are published below).
      bin-name: wf
      tag: ${{ github.event.inputs.tag }}
      gen-docs: true
      publish-crates: true
      crates: "wayfinder-core wayfinder-cli wayfinder-mcp"
      tap-repo: jhheider/homebrew-tap
      tap-formula: Formula/wayfinder.rb
      targets: |
        {"include": [
          {"os":"ubuntu-latest","target":"x86_64-unknown-linux-musl","asset":"wayfinder-linux-x86_64.tar.gz"},
          {"os":"ubuntu-latest","target":"aarch64-unknown-linux-musl","asset":"wayfinder-linux-aarch64.tar.gz"},
          {"os":"macos-latest","target":"x86_64-apple-darwin","asset":"wayfinder-macos-x86_64.tar.gz"},
          {"os":"macos-latest","target":"aarch64-apple-darwin","asset":"wayfinder-macos-aarch64.tar.gz"},
          {"os":"windows-latest","target":"x86_64-pc-windows-msvc","asset":"wayfinder-windows-x86_64.zip"}
        ]}
    secrets: inherit
